<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="data:,">
<title>Reset Password | Showbin</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="nav.css">
<style>
body{font-family:'Inter',sans-serif;}
.wrap{max-width:360px;margin:80px auto;padding:0 20px;color:#fff;}
h1{font-size:18px;font-weight:600;margin-bottom:20px;}
.field{margin-bottom:14px;}
.field label{display:block;font-size:11.5px;color:#555;text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px;}
.field input{width:100%;background:#181818;border:none;border-bottom:1px solid #282828;color:#fff;font-size:14px;padding:8px 10px;outline:none;font-family:inherit;}
.field input:focus{border-bottom-color:#555;}
.btn{width:100%;background:#282828;border:1px solid #383838;color:#fff;font-size:13.5px;font-weight:500;padding:10px;cursor:pointer;font-family:inherit;margin-top:6px;}
.btn:hover{background:#333;}
.msg{margin-top:12px;font-size:13px;}
.ok{color:#66cc66;}.err{color:#ff4444;}
</style>
</head>
<body>
<div class="wrap">
  <h1>Reset Password</h1>
  <div id="content">
    <div class="field"><label>New Password</label><input type="password" id="pw1" placeholder="Enter new password"></div>
    <div class="field"><label>Confirm Password</label><input type="password" id="pw2" placeholder="Confirm new password"></div>
    <button class="btn" onclick="doReset()">Reset Password</button>
    <div class="msg" id="msg"></div>
  </div>
</div>
<script>
  function getUsers(){try{return JSON.parse(localStorage.getItem('sb_users')||'{}')}catch{return{}}}
  function saveUsers(u){localStorage.setItem('sb_users',JSON.stringify(u))}

  const params=new URLSearchParams(location.search);
  const token=params.get('token');
  if(!token){document.getElementById('content').innerHTML='<p style="color:#ff4444;">Invalid or missing reset token.</p>';}

  function findUserByToken(t){
    const users=getUsers();
    return Object.values(users).find(u=>u.resetToken===t)||null;
  }

  function doReset(){
    const pw1=document.getElementById('pw1').value;
    const pw2=document.getElementById('pw2').value;
    const msg=document.getElementById('msg');
    if(!pw1||!pw2){msg.className='msg err';msg.textContent='Please fill in both fields.';return;}
    if(pw1!==pw2){msg.className='msg err';msg.textContent='Passwords do not match.';return;}
    if(pw1.length<6){msg.className='msg err';msg.textContent='Password must be at least 6 characters.';return;}
    const user=findUserByToken(token);
    if(!user){msg.className='msg err';msg.textContent='Invalid or expired token.';return;}
    const users=getUsers();
    const key=user.username.toLowerCase();
    users[key].password=btoa(pw1);
    delete users[key].resetToken;
    saveUsers(users);
    msg.className='msg ok';msg.textContent='Password reset successfully. You can now log in.';
    document.getElementById('pw1').disabled=true;
    document.getElementById('pw2').disabled=true;
  }
</script>
</body>
</html>
