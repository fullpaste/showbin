<script src="showbin.js"></script>
<script>
    function openContact(e) { e.preventDefault(); document.getElementById('contactModal').style.display = 'flex'; }
    function closeContact() { document.getElementById('contactModal').style.display = 'none'; }

    document.querySelector('.navbar-toggler').addEventListener('click', () => document.querySelector('.nav-wrapper').classList.toggle('show'));
    document.querySelectorAll('.online-count').forEach(el => { el.textContent='42'; el.style.display='flex'; el.classList.add('connected'); });

    function getUsers() {
        try { return JSON.parse(localStorage.getItem('sb_users') || '{}'); } catch { return {}; }
    }

    function renderUsers(filter) {
        const users = getUsers();
        const content = document.getElementById('usersContent');

        // ── ELITES (admins) ──
        const elites = JSON.parse(localStorage.getItem('sb_elites') || '[]');
        let eliteHTML = '';
        if (elites.length) {
            const eliteUsers = elites.map(un => users[un]).filter(Boolean);
            eliteHTML = `
                <div class="elites-section">
                    <div class="elites-title">✦ Showbin Elites ✦</div>
                    ${eliteUsers.map(u => `
                        <div class="elite-card">
                            <span>
                                <span style="color:#fff;font-weight:600;">${escHtml(u.username)}</span>
                                ${u.adminRankName ? `<span class="elite-rank-tag" style="${u.adminRankStyle||'color:#fff;font-weight:600;'}">[${escHtml(u.adminRankName)}]</span>` : '<span class="elite-rank-tag" style="color:#555;">[Admin]</span>'}
                            </span>
                            <span style="color:#444;font-size:12px;">${u.joined || '—'}</span>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        // ── MEMBERS ──
        const list = Object.values(users).filter(u => !filter || u.username.toLowerCase().includes(filter.toLowerCase()));
        const nonAdmins = list.filter(u => !elites.includes(u.username.toLowerCase()));

        if (!nonAdmins.length && !elites.length) {
            content.innerHTML = '<p style="text-align:center;color:#555;padding:30px;">No users found.</p>';
            document.getElementById('showingText').textContent = 'Showing 0 users';
            return;
        }

        document.getElementById('showingText').textContent = `Showing ${list.length} user${list.length !== 1 ? 's' : ''}`;

        content.innerHTML = eliteHTML + (nonAdmins.length ? `
            <div class="rank-section">
                <h2>Members</h2>
                <table>
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Username</th>
                            <th>Pastes</th>
                            <th>Comments</th>
                            <th>Joined</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${nonAdmins.map((u, i) => `
                            <tr>
                                <td>${i + 1}</td>
                                <td>
                                    <span style="color:#2A9FD6;font-weight:500;">${escHtml(u.username)}</span>
                                    ${u.rank ? `<span style="font-size:11px;color:#555;margin-left:4px;">[${escHtml(u.rank)}]</span>` : ''}
                                </td>
                                <td>${countPastes(u.username)}</td>
                                <td>0</td>
                                <td>${u.joined || '—'}</td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            </div>
        ` : '');
    }

    function countPastes(username) {
        const pastes = getPastes();
        return pastes.filter(p => p.author === username).length;
    }

    function doSearch(e) {
        e.preventDefault();
        renderUsers(document.getElementById('searchBox').value.trim());
    }

    renderUsers();
</script>
