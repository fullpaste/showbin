<!DOCTYPE html>
<html><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Hall of Shame | Showbin</title>

    <style>
        input { outline: none !important; box-shadow: none !important; }
        *:focus { outline: none !important; box-shadow: none !important; }
        ::-webkit-scrollbar { display: none; }
        html { -ms-overflow-style: none; scrollbar-width: none; }
        body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; }

        .hoa-wrapper {
            min-height: calc(100vh - 48px);
            background-color: #060606;
            overflow: hidden;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 2rem 1rem;
        }

        /* Chroma red/white animated gradient for title and names */
        @keyframes chroma-shame {
            0%   { background-position: 0% 50%; }
            50%  { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .shame-chroma {
            background: linear-gradient(90deg, #ff2222, #ff8888, #ffffff, #ff4444, #ffaaaa, #ffffff, #ff2222);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: chroma-shame 4s ease infinite;
        }

        .page-title {
            text-align: center;
            font-size: 2.5rem;
            font-weight: 600;
            margin-bottom: 2rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: none;
        }

        .hoa-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 0.75rem;
            padding: 0.5rem;
        }

        .hoa-card {
            background: #0E0E0E;
            border: 1px solid #2a2a2a;
            overflow: hidden;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .hoa-image {
            width: 100%;
            height: 300px;
            overflow: hidden;
            border-bottom: 1px solid #2a2a2a;
            background: #0a0a0a;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .hoa-image img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .hoa-content {
            padding: 0.5rem;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .hoa-name {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            text-align: center;
            width: 100%;
        }

        .hoa-description {
            color: #b0b0b0;
            font-size: 0.85rem;
            line-height: 1.5;
            flex-grow: 1;
            max-height: calc(1.5rem * 6);
            overflow-y: auto;
            overflow-x: hidden;
            padding-right: 0.5rem;
            padding-left: 0.5rem;
            text-align: center;
            width: 100%;
            white-space: pre-line;
            word-wrap: break-word;
            word-break: break-word;
            scrollbar-width: thin;
        }
        .hoa-description::-webkit-scrollbar { display: block; width: 6px; }
        .hoa-description::-webkit-scrollbar-track { background: #111; }
        .hoa-description::-webkit-scrollbar-thumb { background-color: #333; }
        .hoa-description a { color: white; text-decoration: none; }
        .hoa-description a:hover { text-decoration: underline; }

        .empty-grid {
            text-align: center;
            color: #444;
            padding: 60px 0;
            font-size: 14px;
        }

        @media screen and (max-width: 768px) {
            .hoa-grid { grid-template-columns: 1fr; }
            .page-title { font-size: 1.8rem; }
        }
    </style>

    <nav>
        <div class="container" style="max-width:1200px;margin:0 auto;padding:0 22.5px;height:48px;display:flex;align-items:center;justify-content:space-between;">

            <div class="nav-wrapper">
                <ul class="nav-menu">

                    <li><a href="add.html">Add Paste</a></li>
                    <li><a href="users.html">Users</a></li>
                    <li><a href="upgrades.html">Upgrades</a></li>
                    <li class="active"><a href="hof.html">Hall of Shame</a></li>

                <style>
                    .online-count { display:flex; align-items:center; color:#00ff00; font-size:12px; }
                    .online-count::before { content:''; display:inline-block; width:6px; height:6px; background:#00ff00; border-radius:50%; margin-right:6px; animation:pulse 2s infinite; box-shadow:0 0 0 0 rgba(0,255,0,.7); }
                    @keyframes pulse { 0%{box-shadow:0 0 0 0 rgba(0,255,0,.7)} 70%{box-shadow:0 0 0 6px rgba(0,255,0,0)} 100%{box-shadow:0 0 0 0 rgba(0,255,0,0)} }
                    .online-count.mobile-only { display:none !important; }
                </style>
                <div class="online-count desktop-only" style="display:none;">0</div>
                <div class="nav-auth">
                    <li><a href="login.html">Login</a></li>
                    <li><a href="register.html">Register</a></li>
                </div>
            </div>
        </div>
    </nav>
</head>

<div class="hoa-wrapper">
    <div class="container">
        <h1 class="page-title shame-chroma">Hall of Shame</h1>
        <div class="hoa-grid" id="hoaGrid">
            <div class="empty-grid" style="grid-column:1/-1;">No entries yet.</div>
        </div>

<script>
    document.querySelector('.navbar-toggler').addEventListener('click', () => document.querySelector('.nav-wrapper').classList.toggle('show'));
    document.querySelectorAll('.online-count').forEach(el => { el.textContent='42'; el.style.display='flex'; el.classList.add('connected'); });
    function openContact(e){e.preventDefault();document.getElementById('contactModal').style.display='flex';}
    function closeContact(){document.getElementById('contactModal').style.display='none';}

    function loadHof(){
        const entries=JSON.parse(localStorage.getItem('sb_hof')||'[]');
        const grid=document.getElementById('hoaGrid');
        if(!entries.length){grid.innerHTML='<div class="empty-grid" style="grid-column:1/-1;">No entries yet.</div>';return;}
        grid.innerHTML=entries.map(e=>`
            <div class="hoa-card">
                ${e.img?`<div class="hoa-image"><img src="${e.img}" alt="${e.title}" onerror="this.parentElement.style.display='none'"></div>`:''}
                <div class="hoa-content">
                    <h2 class="hoa-name shame-chroma">${e.title}</h2>
                    <div class="hoa-description">${e.desc.replace(/\n/g,'<br>')}${e.url?`<br><a href="${e.url}" target="_blank" style="color:#2A9FD6;">paste</a>`:''}</div>
                </div>
            </div>
        `).join('');
    }
    loadHof();
</script>
</body></html>
